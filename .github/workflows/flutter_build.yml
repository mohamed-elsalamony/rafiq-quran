name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-pub --android-skip-build-dependency-validation


      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rafiq-quran-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.0-latest
          name: "النسخة الأحدث من التطبيق (Latest Release)"
          body: "النسخة الأحدث من تطبيق رفيق القرآن، خالية من العيوب والنسخ التجريبية وتم تجميعها بنجاح بواسطة GitHub Actions."
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
